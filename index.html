<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLAIMS 2.0 — Redesigned</title>
<!-- Optional: absolute API origin when this page is not served with a same-origin /api/* proxy. Leave empty to try same-origin first, then http://localhost:8001 on localhost. -->
<meta name="claims-api-base" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div>
        <div class="header-title">Paragraph ↔ Claim Mapping</div>
        <div class="header-sub">CLAIMS 2.0 · Greenwashing discourse validation · Native advertising corpus</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-chip">
        <span class="stat-dot" style="background:#3b82f6"></span>
        <strong id="stat-paragraphs">0</strong> paragraphs
      </div>
      <div class="stat-chip">
        <span class="stat-dot" style="background:var(--teal)"></span>
        <strong id="stat-subclaims">0</strong> subclaims
      </div>
      <div class="stat-chip">
        <span class="stat-dot" style="background:var(--amber)"></span>
        <strong id="stat-superclaims">0</strong> superclaims
      </div>
      <div class="stat-chip">
        <span class="stat-dot" style="background:#a855f7"></span>
        <strong id="stat-proposals">0</strong> pending proposals
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-section">
    <label class="field-label" for="article-input">Article Text</label>
    <textarea id="article-input" class="text-input" placeholder="Paste article text here… Separate paragraphs with a blank line."></textarea>
    <div class="controls">
      <button id="analyze-btn" class="btn-primary" type="button">Analyze Paragraphs</button>
      <span id="status" class="status"></span>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="section-title">Paragraph ↔ Claim Mappings</div>
  <div id="results-container"></div>

  <!-- PROPOSALS -->
  <div class="section-title" style="margin-top:28px">Pending Taxonomy Proposals <span style="background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.35);color:#c4b5fd;font-size:10px;padding:2px 8px;border-radius:999px;letter-spacing:0.06em;font-weight:600;margin-left:4px">Human Approval</span></div>

  <div class="proposals-container" id="proposals-container">
    <div class="reviewer-row">
      <label class="field-label" for="reviewer-name" style="margin:0;white-space:nowrap">Reviewer Name</label>
      <input id="reviewer-name" type="text" class="reviewer-input" placeholder="Your name (stored locally)" maxlength="120" autocomplete="name" />
    </div>
    <div id="proposals-list"></div>
  </div>

  </div>
<script src="script.js"></script>
</body>
</html>
